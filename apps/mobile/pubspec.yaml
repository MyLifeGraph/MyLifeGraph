name: my_life_graph
description: Mobile-first AI-powered personal coach and life graph app foundation.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  connectivity_plus: ">=6.1.5 <7.0.0"
  dio: ^5.7.0
  # Keep Dart 3.4 resolvable through file_selector 1.0.3; 1.1 needs Dart 3.9.
  file_selector: 1.0.3
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  intl: ^0.20.1
  path_provider: ^2.1.5
  # 10.1.4 supports Dart 3.4/AGP 8.3; 12.x requires AGP 8.12.1.
  share_plus: ">=10.1.4 <11.0.0"
  shared_preferences: ^2.3.3
  supabase_flutter: ^2.8.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
